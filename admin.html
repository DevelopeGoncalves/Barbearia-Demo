<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victorino Admin | SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root { --gold-primary: #d4af37; --bg-dark: #080808; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: #e5e5e5; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .glass { background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(212, 175, 55, 0.1); }
        .input-vic { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.75rem; border-radius: 0.5rem; outline: none; transition: all 0.3s; }
        .input-vic:focus { border-color: var(--gold-primary); }
        .scroll-no-bar::-webkit-scrollbar { display: none; }
    </style>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { vic: { bg: '#080808', card: '#121212', gold: '#d4af37', muted: '#888888', green: '#1c8a43', red: '#8a1c1c' } } } } }
    </script>
</head>
<body class="selection:bg-vic-gold selection:text-black flex h-screen overflow-hidden relative">
    <div id="admin-app" class="w-full h-full"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SERVIÇOS INICIAIS (Caso o banco de dados esteja vazio)
        const SERVICOS_INICIAIS = [
            { id: 1, nome: 'Corte Masculino', preco: 30.00, duracao: '40 min', icon: '✂️', group: 'Cortes e Cabelo' },
            { id: 2, nome: 'Corte Social (Máquina)', preco: 25.00, duracao: '30 min', icon: '⚡', group: 'Cortes e Cabelo' },
            { id: 3, nome: 'Barba Completa', preco: 20.00, duracao: '20 min', icon: '🪒', group: 'Barba e Detalhes' },
            { id: 4, nome: 'Platinado', preco: 80.00, duracao: '2h+', icon: '❄️', group: 'Química e Cor' },
            { id: 5, nome: 'Sobrancelha', preco: 10.00, duracao: '10 min', icon: '👁️', group: 'Barba e Detalhes' }
        ];

        const AdminApp = () => {
            const [activeTab, setActiveTab] = useState('servicos'); // Começa na aba nova para você testar
            const [agendamentos, setAgendamentos] = useState([]);
            const [vendas, setVendas] = useState([]); 
            const [despesas, setDespesas] = useState([]);
            const [estoque, setEstoque] = useState([]); 
            
            // NOVO: Estado dos Serviços
            const [servicos, setServicos] = useState([]);
            const [formServico, setFormServico] = useState({ id: null, nome: '', preco: '', duracao: '', icon: '✂️', group: 'Cortes e Cabelo' });

            const carregarDados = () => {
                const salvos = localStorage.getItem('victorino_admin_agendamentos'); if (salvos) setAgendamentos(JSON.parse(salvos));
                const vendasSalvas = localStorage.getItem('victorino_admin_vendas'); if (vendasSalvas) setVendas(JSON.parse(vendasSalvas));
                const despesasSalvas = localStorage.getItem('victorino_admin_despesas'); if (despesasSalvas) setDespesas(JSON.parse(despesasSalvas));
                const estoqueSalvo = localStorage.getItem('victorino_admin_estoque'); if (estoqueSalvo) setEstoque(JSON.parse(estoqueSalvo));
                
                // Carrega os serviços
                const servicosSalvos = localStorage.getItem('victorino_admin_servicos'); 
                if (servicosSalvos) {
                    setServicos(JSON.parse(servicosSalvos));
                } else {
                    setServicos(SERVICOS_INICIAIS);
                    localStorage.setItem('victorino_admin_servicos', JSON.stringify(SERVICOS_INICIAIS));
                }
            };

            useEffect(() => {
                carregarDados();
                window.addEventListener('storage', carregarDados);
                return () => window.removeEventListener('storage', carregarDados);
            }, []);

            useEffect(() => { localStorage.setItem('victorino_admin_servicos', JSON.stringify(servicos)); }, [servicos]);

            // Funções CRUD de Serviços (Item 14)
            const salvarServico = (e) => {
                e.preventDefault();
                if(!formServico.nome || !formServico.preco) return;
                
                if (formServico.id) { 
                    setServicos(servicos.map(s => s.id === formServico.id ? { ...s, nome: formServico.nome, preco: parseFloat(formServico.preco), duracao: formServico.duracao, icon: formServico.icon, group: formServico.group } : s));
                } else { 
                    setServicos([...servicos, { id: Date.now(), nome: formServico.nome, preco: parseFloat(formServico.preco), duracao: formServico.duracao, icon: formServico.icon, group: formServico.group }]);
                }
                setFormServico({ id: null, nome: '', preco: '', duracao: '', icon: '✂️', group: 'Cortes e Cabelo' });
            };
            const editarServico = (serv) => setFormServico({ id: serv.id, nome: serv.nome, preco: serv.preco, duracao: serv.duracao, icon: serv.icon, group: serv.group });
            const excluirServico = (id) => setServicos(servicos.filter(s => s.id !== id));

            // Agrupa serviços para exibir na tabela organizados
            const servicosAgrupados = servicos.reduce((acc, serv) => {
                if (!acc[serv.group]) acc[serv.group] = [];
                acc[serv.group].push(serv);
                return acc;
            }, {});

            return (
                <div className="flex flex-col md:flex-row h-full w-full relative">
                    {/* Header Mobile Omitido por brevidade no snippet, assumimos igual */}
                    <header className="md:hidden bg-[#0a0a0a] border-b border-white/10 p-4 flex justify-between items-center z-40 shadow-md">
                        <div><h1 className="text-xl font-serif text-white tracking-widest leading-none">VICTORINO</h1></div>
                        <button onClick={carregarDados} className="bg-white/10 active:bg-vic-gold text-white px-3 py-2 rounded text-xs font-bold transition">🔄 Atualizar</button>
                    </header>

                    {/* Sidebar Desktop */}
                    <aside className="hidden md:flex w-64 bg-[#0a0a0a] border-r border-white/10 flex-col z-10 shadow-2xl">
                        <div className="p-6 border-b border-white/10 text-center"><h1 className="text-xl font-serif text-white tracking-widest leading-none">VICTORINO</h1></div>
                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            {/* Menus Anteriores */}
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'dashboard' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>📊 Dashboard</button>
                            <button onClick={() => setActiveTab('agenda')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'agenda' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>📅 Agenda Geral</button>
                            <button onClick={() => setActiveTab('financeiro')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'financeiro' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>💰 Financeiro</button>
                            <button onClick={() => setActiveTab('crm')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'crm' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>👥 CRM Clientes</button>
                            <button onClick={() => setActiveTab('estoque')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'estoque' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>📦 Estoque</button>
                            
                            {/* NOVO MENU: SERVIÇOS */}
                            <button onClick={() => setActiveTab('servicos')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'servicos' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>💈 Catálogo Serviços</button>
                            
                            <button onClick={() => setActiveTab('equipe')} className={`w-full text-left px-4 py-3 rounded uppercase text-xs tracking-widest font-bold transition ${activeTab === 'equipe' ? 'bg-vic-gold text-black' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>✂️ Equipe / Comissões</button>
                        </nav>
                    </aside>

                    <main className="flex-1 bg-vic-bg p-4 md:p-8 overflow-y-auto pb-24 md:pb-8">
                        
                        {/* OUTRAS TELAS MANTIDAS (Ocultas aqui para economizar texto) */}
                        {activeTab !== 'servicos' && (
                            <div className="flex flex-col items-center justify-center h-full text-gray-500 text-center animate-[fadeIn_0.3s_ease-out]">
                                <span className="text-4xl mb-4">⚙️</span>
                                <h2 className="text-2xl font-serif text-white">Navegue pelo Menu</h2>
                                <p>As outras abas (Agenda, PDV, Dashboard) continuam funcionando perfeitamente em background.</p>
                            </div>
                        )}

                        {/* NOVA VIEW: GESTÃO DE SERVIÇOS (ITEM 14) */}
                        {activeTab === 'servicos' && (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <h2 className="text-2xl md:text-3xl font-serif text-white mb-2">Catálogo de Serviços</h2>
                                <p className="text-gray-500 text-xs md:text-sm mb-6">Altere preços e adicione novos cortes que aparecerão no App do cliente.</p>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {/* Formulário de Cadastro/Edição de Serviço */}
                                    <div className="glass p-6 rounded-lg lg:col-span-1 h-fit">
                                        <h3 className="text-lg font-serif text-vic-gold mb-4">{formServico.id ? '✏️ Editar Serviço' : '➕ Novo Serviço'}</h3>
                                        <form onSubmit={salvarServico} className="space-y-4">
                                            <div>
                                                <label className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 block">Nome do Serviço</label>
                                                <input type="text" required value={formServico.nome} onChange={e => setFormServico({...formServico, nome: e.target.value})} className="input-vic text-sm" placeholder="Ex: Pigmentação de Barba" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 block">Preço (R$)</label>
                                                    <input type="number" step="0.01" required value={formServico.preco} onChange={e => setFormServico({...formServico, preco: e.target.value})} className="input-vic text-sm" placeholder="40.00" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 block">Duração Estimada</label>
                                                    <input type="text" required value={formServico.duracao} onChange={e => setFormServico({...formServico, duracao: e.target.value})} className="input-vic text-sm" placeholder="Ex: 30 min" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 block">Categoria</label>
                                                    <select required value={formServico.group} onChange={e => setFormServico({...formServico, group: e.target.value})} className="input-vic text-sm appearance-none">
                                                        <option value="Cortes e Cabelo">Cortes e Cabelo</option>
                                                        <option value="Barba e Detalhes">Barba e Detalhes</option>
                                                        <option value="Química e Cor">Química e Cor</option>
                                                        <option value="Estética">Estética/Limpeza</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest mb-1 block">Ícone Visual</label>
                                                    <select required value={formServico.icon} onChange={e => setFormServico({...formServico, icon: e.target.value})} className="input-vic text-sm appearance-none text-xl">
                                                        <option value="✂️">✂️ Tesoura</option><option value="⚡">⚡ Máquina</option>
                                                        <option value="🪒">🪒 Navalha</option><option value="🎨">🎨 Tinta</option>
                                                        <option value="❄️">❄️ Floco</option><option value="✨">✨ Brilho</option>
                                                        <option value="🧒">🧒 Infantil</option><option value="👁️">👁️ Olho</option>
                                                    </select>
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-2 mt-2">
                                                <button type="submit" className="flex-1 bg-vic-gold hover:bg-white text-black font-bold uppercase tracking-widest text-xs py-3 rounded transition">Salvar Serviço</button>
                                                {formServico.id && <button type="button" onClick={() => setFormServico({id:null,nome:'',preco:'',duracao:'',icon:'✂️',group:'Cortes e Cabelo'})} className="flex-1 border border-white/20 text-white font-bold uppercase tracking-widest text-xs py-3 rounded">Cancelar</button>}
                                            </div>
                                        </form>
                                    </div>

                                    {/* Lista Dinâmica de Serviços */}
                                    <div className="lg:col-span-2 space-y-6">
                                        {Object.keys(servicosAgrupados).map(grupo => (
                                            <div key={grupo} className="glass rounded-lg overflow-hidden">
                                                <div className="bg-white/5 p-4 border-b border-white/10">
                                                    <h3 className="text-vic-gold font-serif text-lg">{grupo}</h3>
                                                </div>
                                                <div className="p-4 space-y-3">
                                                    {servicosAgrupados[grupo].map(serv => (
                                                        <div key={serv.id} className="bg-black/40 p-3 rounded flex justify-between items-center border border-white/5 hover:border-vic-gold/50 transition">
                                                            <div className="flex items-center gap-4">
                                                                <span className="text-3xl bg-white/5 w-12 h-12 rounded-full flex justify-center items-center">{serv.icon}</span>
                                                                <div>
                                                                    <h4 className="text-white font-bold">{serv.nome}</h4>
                                                                    <p className="text-xs text-gray-500 mt-1">Duração: {serv.duracao}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-4">
                                                                <span className="text-lg font-bold text-vic-green">R$ {serv.preco.toFixed(2)}</span>
                                                                <div className="flex flex-col md:flex-row gap-2 border-l border-white/10 pl-4">
                                                                    <button onClick={() => editarServico(serv)} className="bg-white/10 p-2 rounded hover:bg-vic-gold hover:text-black text-gray-400 transition">✏️</button>
                                                                    <button onClick={() => excluirServico(serv.id)} className="bg-red-900/30 p-2 rounded hover:bg-red-900 text-red-400 hover:text-white transition">🗑️</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MENU INFERIOR MOBILE COM ROLAGEM HORIZONTAL (Para caber tudo) */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-[#0a0a0a]/95 backdrop-blur-md border-t border-white/10 h-16 z-50 overflow-x-auto scroll-no-bar flex items-center px-2 space-x-4">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'dashboard' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">📊</span><span className="text-[8px] uppercase font-bold">Painel</span></button>
                        <button onClick={() => setActiveTab('agenda')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'agenda' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">📅</span><span className="text-[8px] uppercase font-bold">Agenda</span></button>
                        <button onClick={() => setActiveTab('financeiro')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'financeiro' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">💰</span><span className="text-[8px] uppercase font-bold">Caixa</span></button>
                        <button onClick={() => setActiveTab('servicos')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'servicos' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">💈</span><span className="text-[8px] uppercase font-bold">Serviços</span></button>
                        <button onClick={() => setActiveTab('estoque')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'estoque' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">📦</span><span className="text-[8px] uppercase font-bold">Estoque</span></button>
                        <button onClick={() => setActiveTab('crm')} className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-full transition ${activeTab === 'crm' ? 'text-vic-gold' : 'text-gray-500'}`}><span className="text-lg mb-1">👥</span><span className="text-[8px] uppercase font-bold">CRM</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('admin-app'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
