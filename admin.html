<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Victorino Barber | ERP & Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --gold-light: #f0d98c; --bg: #050505; --card: #111111; --border: rgba(255,255,255,0.08); --text: #e8e8e8; --muted: #888; --success: #5bdd5b; --danger: #ff5b5b; --warning: #f5a623; }
        * { box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .stat-card { background: linear-gradient(135deg, var(--card), #161616); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
        
        .input-field { width: 100%; background: #0a0a0a; border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 8px; outline: none; font-size: 14px; margin-top: 4px; transition: 0.2s; }
        .input-field:focus { border-color: var(--gold); }
        .input-field:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--gold); color: #000; font-weight: 700; text-transform: uppercase; font-size: 12px; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: var(--gold-light); }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); font-weight: 600; text-transform: uppercase; font-size: 12px; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; text-align: center; }
        .btn-danger { background: rgba(255, 91, 91, 0.1); color: var(--danger); border: 1px solid rgba(255, 91, 91, 0.3); font-weight: 600; font-size: 11px; padding: 8px 12px; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 600; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge.pendente { background: rgba(245, 166, 35, 0.1); color: var(--warning); border: 1px solid rgba(245, 166, 35, 0.3); }
        .badge.concluido { background: rgba(91, 221, 91, 0.1); color: var(--success); border: 1px solid rgba(91, 221, 91, 0.3); }
        .badge.cancelado { background: rgba(255, 91, 91, 0.1); color: var(--danger); border: 1px solid rgba(255, 91, 91, 0.3); }
        .badge.bloqueio { background: rgba(136, 136, 136, 0.2); color: #fff; border: 1px solid rgba(136, 136, 136, 0.5); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; border-radius: 16px; padding: 24px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

        .nav-sidebar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px); overflow-x: auto; scrollbar-width: none; }
        .nav-sidebar::-webkit-scrollbar { display: none; }
        .nav-item { min-width: 72px; flex: 1; text-align: center; padding: 12px 4px; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-item.active { color: var(--gold); }

        .login-wrap { min-height: 100svh; display: flex; align-items: center; justify-content: center; padding: 20px; background: url('img/hero_bg.jpg') center/cover; position: relative; }
        .login-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.98), rgba(0,0,0,0.8)); }
        
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media(min-width: 768px) {
            .nav-sidebar { top: 0; right: auto; width: 90px; flex-direction: column; border-top: none; border-right: 1px solid var(--border); padding-top: 20px; }
            .nav-item { min-width: 100%; padding: 20px 4px; }
            .main-wrap { padding-left: 90px; padding-bottom: 0; }
        }
    </style>
</head>
<body>
    <div id="admin-app"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ALL_SLOTS = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];

        const INITIAL_DATA = {
            admin: { login: 'admin', senha: '123' },
            barbeiros: [
                { id: 1, nome: 'Barbeiro 1', login: 'barbeiro1', senha: '123', comissao: 50, img: 'img/barbeiro1.jpg', especialidade: 'Cortes Modernos', telefone: '5527999999999' },
                { id: 2, nome: 'Barbeiro 2', login: 'barbeiro2', senha: '123', comissao: 40, img: 'img/barbeiro2.jpg', especialidade: 'Barbas & Detalhes', telefone: '5527999999999' },
                { id: 3, nome: 'Barbeiro 3', login: 'barbeiro3', senha: '123', comissao: 50, img: 'img/barbeiro3.jpg', especialidade: 'Pinturas & Platinados', telefone: '5527999999999' }
            ],
            indisponibilidade: { 'Barbeiro 1': [0, 1], 'Barbeiro 2': [0, 2], 'Barbeiro 3': [0, 3] },
            servicos: [
                { id: 1, nome: 'Corte Masculino', preco: 30, duracao: '40 min', group: 'Cortes e Cabelo', img: 'img/corte_masculino.jpg' },
                { id: 2, nome: 'Barba Completa', preco: 20, duracao: '20 min', group: 'Barba e Detalhes', img: 'img/barba_completa.jpg' },
                { id: 3, nome: 'Combo Corte + Barba', preco: 45, duracao: '60 min', group: 'Barba e Detalhes', img: 'img/combo_corte_barba.jpg' }
            ],
            produtos: [
                { id: 101, nome: 'Kit Pomada/Gel Black', preco: 45, categoria: 'Cabelo', img: 'img/produto_pomada.jpg', sub: 'Modeladores', estoque: 10 },
                { id: 201, nome: 'Perfume Árabe Oud', preco: 180, categoria: 'Perfumes', img: 'img/arabe1.jpg', sub: 'Árabes', estoque: 4 }
            ],
            despesas: []
        };

        const Icon = ({n, size=24}) => {
            const i = {
                dashboard: <><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>,
                list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
                box: <><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,
                dollar: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{i[n]}</svg>;
        };

        const App = () => {
            const [user, setUser] = useState(() => JSON.parse(sessionStorage.getItem('vic_user')));
            const [view, setView] = useState('dashboard');
            
            const [db, setDb] = useState(() => {
                const localData = JSON.parse(localStorage.getItem('vic_data'));
                if (localData && !localData.admin) {
                    const updatedData = { ...localData, admin: INITIAL_DATA.admin };
                    updatedData.barbeiros = updatedData.barbeiros.map(b => ({ ...b, login: b.login || `barbeiro${b.id}`, senha: b.senha || '123', comissao: b.comissao || 50 }));
                    localStorage.setItem('vic_data', JSON.stringify(updatedData));
                    return updatedData;
                }
                return localData || INITIAL_DATA;
            });

            const [agendamentos, setAgendamentos] = useState(() => JSON.parse(localStorage.getItem('vic_agendamentos')) || []);
            
            const [bloqueios, setBloqueios] = useState(() => {
                const blks = JSON.parse(localStorage.getItem('vic_bloqueios')) || [];
                return blks.filter(b => b.dataInicio || b.horarioInicio || b.tipo);
            });
            
            const [modal, setModal] = useState(null);
            const [form, setForm] = useState({});

            // Sync functions
            const saveDb = (newDb) => { setDb(newDb); localStorage.setItem('vic_data', JSON.stringify(newDb)); };
            const saveAgendamentos = (arr) => { setAgendamentos(arr); localStorage.setItem('vic_agendamentos', JSON.stringify(arr)); };
            const saveBloqueios = (arr) => { setBloqueios(arr); localStorage.setItem('vic_bloqueios', JSON.stringify(arr)); };

            useEffect(() => {
                const sync = () => {
                    setDb(JSON.parse(localStorage.getItem('vic_data')) || INITIAL_DATA);
                    setAgendamentos(JSON.parse(localStorage.getItem('vic_agendamentos')) || []);
                    const blks = JSON.parse(localStorage.getItem('vic_bloqueios')) || [];
                    setBloqueios(blks.filter(b => b.dataInicio || b.horarioInicio || b.tipo));
                };
                window.addEventListener('storage', sync);
                return () => window.removeEventListener('storage', sync);
            }, []);

            /* ─── LOGIN ─── */
            const handleLogin = (e) => {
                e.preventDefault();
                const u = e.target.login.value; const p = e.target.senha.value;
                const adminData = db.admin || INITIAL_DATA.admin;
                
                if (u === adminData.login && p === adminData.senha) {
                    const session = { role: 'admin', nome: 'Administrador' };
                    setUser(session); sessionStorage.setItem('vic_user', JSON.stringify(session));
                } else {
                    const b = db.barbeiros.find(x => x.login === u && x.senha === p);
                    if (b) {
                        const session = { role: 'barber', id: b.id, nome: b.nome, comissao: b.comissao };
                        setUser(session); sessionStorage.setItem('vic_user', JSON.stringify(session));
                    } else alert('Usuário ou senha incorretos.');
                }
            };
            const logout = () => { setUser(null); sessionStorage.removeItem('vic_user'); };

            if (!user) {
                return (
                    <div className="login-wrap">
                        <div style={{ position: 'relative', zIndex: 1, width: '100%', maxWidth: 360 }}>
                            <div style={{ textAlign: 'center', marginBottom: 32 }}>
                                <div style={{ width: 64, height: 64, background: 'var(--gold)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#000', fontSize: 32, fontWeight: 700, margin: '0 auto 16px' }}>V</div>
                                <h1 className="serif" style={{ fontSize: 32 }}>Gestão Victorino</h1>
                            </div>
                            <form className="glass" onSubmit={handleLogin}>
                                <div style={{ marginBottom: 16 }}><label style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase' }}>Usuário</label><input name="login" required className="input-field" /></div>
                                <div style={{ marginBottom: 24 }}><label style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase' }}>Senha</label><input name="senha" type="password" required className="input-field" /></div>
                                <button type="submit" className="btn-primary">Entrar no Sistema</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const updateStatus = (id, status) => {
                const ag = agendamentos.find(a => a.id === id);
                if (!ag) return;
                
                if (status === 'concluido') {
                    const barbeiro = db.barbeiros.find(b => b.nome === ag.barberName);
                    const percentual = barbeiro ? barbeiro.comissao : 0;
                    saveAgendamentos(agendamentos.map(a => a.id === id ? { ...a, status, comissao: (ag.totalPrice * percentual) / 100, pctComissao: percentual } : a));
                } else {
                    saveAgendamentos(agendamentos.map(a => a.id === id ? { ...a, status } : a));
                }
            };

            /* ─── TELAS ─── */
            
            // 1. DASHBOARD
            const Dashboard = () => {
                if (user.role === 'admin') {
                    const concluidos = agendamentos.filter(a => a.status === 'concluido');
                    const faturamento = concluidos.reduce((acc, a) => acc + a.totalPrice, 0);
                    const comissoes = concluidos.reduce((acc, a) => acc + (a.comissao || 0), 0);
                    const despesasTotais = (db.despesas || []).reduce((acc, d) => acc + parseFloat(d.valor), 0);
                    const lucroLiquido = faturamento - comissoes - despesasTotais;

                    return (
                        <div className="fade-in" style={{ padding: 20, paddingBottom: 100 }}>
                            <h2 className="serif" style={{ fontSize: 28, marginBottom: 20 }}>Visão Geral (Admin)</h2>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12, marginBottom: 24 }}>
                                <div className="stat-card"><p style={{ fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase' }}>Faturamento Bruto</p><p className="serif" style={{ fontSize: 22, color: 'var(--text)' }}>R$ {faturamento.toFixed(2)}</p></div>
                                <div className="stat-card"><p style={{ fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase' }}>Comissões (Equipe)</p><p className="serif" style={{ fontSize: 22, color: 'var(--warning)' }}>- R$ {comissoes.toFixed(2)}</p></div>
                                <div className="stat-card"><p style={{ fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase' }}>Despesas Fixas</p><p className="serif" style={{ fontSize: 22, color: 'var(--danger)' }}>- R$ {despesasTotais.toFixed(2)}</p></div>
                                <div className="stat-card" style={{ borderColor: lucroLiquido >= 0 ? 'var(--success)' : 'var(--danger)' }}><p style={{ fontSize: 10, color: 'var(--gold)', textTransform: 'uppercase' }}>Lucro Líquido</p><p className="serif" style={{ fontSize: 22, color: lucroLiquido >= 0 ? 'var(--success)' : 'var(--danger)' }}>R$ {lucroLiquido.toFixed(2)}</p></div>
                            </div>
                            <h3 className="serif" style={{ fontSize: 20, marginBottom: 12 }}>Desempenho da Equipe</h3>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {db.barbeiros.map(b => {
                                    const feitos = concluidos.filter(a => a.barberName === b.nome);
                                    const prod = feitos.reduce((acc, a) => acc + a.totalPrice, 0);
                                    return (
                                        <div key={b.id} className="glass" style={{ display: 'flex', justifyContent: 'space-between', padding: 12, margin: 0 }}>
                                            <div><p style={{ fontWeight: 600, fontSize: 14 }}>{b.nome}</p><p style={{ fontSize: 11, color: 'var(--muted)' }}>{feitos.length} serviços</p></div>
                                            <div style={{ textAlign: 'right' }}><p style={{ color: 'var(--gold)', fontWeight: 700 }}>R$ {prod.toFixed(2)}</p></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                } else {
                    const meusConcluidos = agendamentos.filter(a => a.status === 'concluido' && a.barberName === user.nome);
                    const minhaProducao = meusConcluidos.reduce((acc, a) => acc + a.totalPrice, 0);
                    const minhaComissao = meusConcluidos.reduce((acc, a) => acc + (a.comissao || 0), 0);
                    const meusPendentes = agendamentos.filter(a => (a.status === 'pendente' || !a.status) && a.barberName === user.nome).length;

                    return (
                        <div className="fade-in" style={{ padding: 20 }}>
                            <h2 className="serif" style={{ fontSize: 28, marginBottom: 8 }}>Olá, {user.nome.split(' ')[0]}</h2>
                            <p style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 20 }}>Resumo do seu desempenho.</p>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12, marginBottom: 24 }}>
                                <div className="stat-card"><p style={{ fontSize: 10, color: 'var(--muted)', textTransform: 'uppercase' }}>Minha Produção</p><p className="serif" style={{ fontSize: 24, color: 'var(--text)' }}>R$ {minhaProducao.toFixed(2)}</p></div>
                                <div className="stat-card"><p style={{ fontSize: 10, color: 'var(--gold)', textTransform: 'uppercase' }}>Minha Comissão ({user.comissao}%)</p><p className="serif" style={{ fontSize: 24, color: 'var(--success)' }}>R$ {minhaComissao.toFixed(2)}</p></div>
                            </div>
                            <div className="glass" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderColor: meusPendentes > 0 ? 'var(--warning)' : 'var(--border)' }}>
                                <div><p style={{ fontWeight: 700, fontSize: 16 }}>Clientes Aguardando</p><p style={{ fontSize: 12, color: 'var(--muted)' }}>Na sua agenda hoje</p></div>
                                <div style={{ fontSize: 32, fontWeight: 700, color: meusPendentes > 0 ? 'var(--warning)' : 'var(--muted)' }}>{meusPendentes}</div>
                            </div>
                        </div>
                    );
                }
            };

            // 2. AGENDA & BLOQUEIOS
            const Agenda = () => {
                const agLista = user.role === 'admin' ? agendamentos : agendamentos.filter(a => a.barberName === user.nome);
                const blkLista = user.role === 'admin' ? bloqueios : bloqueios.filter(b => b.barberName === user.nome);
                
                const combined = [
                    ...agLista.map(a => ({ ...a, _type: 'agendamento', sortTime: new Date(`${a.date}T${a.time}`) })),
                    ...blkLista.map(b => ({ ...b, _type: 'bloqueio', sortTime: new Date(`${b.tipo === 'dia' ? b.dataInicio : b.data}T${b.tipo === 'dia' ? '00:00' : b.horarioInicio}`) }))
                ].sort((a,b) => b.sortTime - a.sortTime);

                const saveBlock = () => {
                    const novoBlock = { id: Date.now(), ...form };
                    saveBloqueios([...bloqueios, novoBlock]);
                    setModal(null);
                };

                const delBlock = (id) => {
                    if(confirm("Remover este bloqueio da agenda?")) saveBloqueios(bloqueios.filter(b => b.id !== id));
                };

                const formataData = (dataStr) => dataStr ? dataStr.split('-').reverse().join('/') : '';

                return (
                    <div className="fade-in" style={{ padding: 20, paddingBottom: 100 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                            <h2 className="serif" style={{ fontSize: 28 }}>{user.role === 'admin' ? 'Agenda Geral' : 'Minha Agenda'}</h2>
                            <button onClick={() => { 
                                const today = new Date().toISOString().split('T')[0];
                                setForm({ barberName: user.role === 'admin' ? db.barbeiros[0].nome : user.nome, tipo: 'horario', data: today, horarioInicio: '12:00', horarioFim: '13:00', dataInicio: today, dataFim: today, motivo: 'Almoço' }); 
                                setModal({ type: 'bloqueio' }); 
                            }} className="btn-outline" style={{ width: 'auto', padding: '8px 16px', borderColor: 'var(--danger)', color: 'var(--danger)' }}><Icon name="lock" size={16}/> Bloquear</button>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            {combined.map(item => {
                                if (item._type === 'bloqueio') {
                                    return (
                                        <div key={`blk-${item.id}`} className="glass" style={{ borderColor: 'rgba(136, 136, 136, 0.3)', background: 'rgba(20,20,20,0.5)' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <div>
                                                    <p style={{ fontWeight: 700, fontSize: 14, color: '#aaa', display: 'flex', alignItems:'center', gap:6 }}><Icon name="lock" size={14}/> {item.motivo || 'Bloqueado'}</p>
                                                    <p style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>{item.barberName} • {item.tipo === 'horario' ? formataData(item.data) : 'Período de Folga'}</p>
                                                </div>
                                                <div style={{ textAlign: 'right' }}>
                                                    <span className="badge bloqueio">
                                                        {item.tipo === 'dia' ? `DE ${formataData(item.dataInicio)} A ${formataData(item.dataFim)}` : `DAS ${item.horarioInicio} ÀS ${item.horarioFim}`}
                                                    </span>
                                                    <button onClick={() => delBlock(item.id)} style={{ display: 'block', marginTop: 8, fontSize: 11, color: 'var(--danger)', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Desbloquear</button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                }
                                
                                return (
                                    <div key={`ag-${item.id}`} className="glass">
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                                            <div>
                                                <p style={{ fontWeight: 700, fontSize: 15 }}>{item.clientName}</p>
                                                <p style={{ fontSize: 12, color: 'var(--muted)' }}>{item.clientPhone} {user.role === 'admin' && ` • ${item.barberName}`}</p>
                                                <p style={{ fontSize: 13, color: 'var(--gold)', marginTop: 4 }}>{item.date ? formataData(item.date) : '-'} às {item.time}</p>
                                            </div>
                                            <div style={{ textAlign: 'right' }}>
                                                <span className={`badge ${item.status || 'pendente'}`}>{item.status || 'Pendente'}</span>
                                                <p className="serif" style={{ fontSize: 18, marginTop: 6 }}>R$ {item.totalPrice.toFixed(2)}</p>
                                            </div>
                                        </div>
                                        <p style={{ fontSize: 12, background: '#1a1a1a', padding: '6px 10px', borderRadius: 6 }}>✂️ {item.serviceName}</p>
                                        
                                        {(item.status === 'pendente' || !item.status) && (
                                            <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                                                <button onClick={() => updateStatus(item.id, 'concluido')} className="btn-primary" style={{ padding: 8, flex: 1, background: 'var(--success)', color: '#000' }}>Concluir</button>
                                                <button onClick={() => saveAgendamentos(agendamentos.map(a => a.id === item.id ? { ...a, status: 'cancelado' } : a))} className="btn-danger" style={{ flex: 1 }}>Cancelar</button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                            {combined.length === 0 && <p style={{ textAlign: 'center', color: 'var(--muted)' }}>Nenhum registro encontrado.</p>}
                        </div>

                        {modal && modal.type === 'bloqueio' && (
                            <div className="modal-overlay">
                                <div className="modal-content">
                                    <h3 className="serif" style={{ fontSize: 22, marginBottom: 16 }}>Bloquear Agenda</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
                                        {user.role === 'admin' && (
                                            <div>
                                                <label style={{ fontSize: 11, color: 'var(--muted)' }}>PROFISSIONAL</label>
                                                <select className="input-field" value={form.barberName} onChange={e => setForm({...form, barberName: e.target.value})}>
                                                    {db.barbeiros.map(b => <option key={b.id} value={b.nome}>{b.nome}</option>)}
                                                </select>
                                            </div>
                                        )}
                                        
                                        <div style={{ display: 'flex', gap: 12 }}>
                                            <div style={{ flex: 1 }}>
                                                <label style={{ fontSize: 11, color: 'var(--muted)' }}>TIPO DE BLOQUEIO</label>
                                                <select className="input-field" value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
                                                    <option value="horario">Por Horário (ex: Almoço)</option>
                                                    <option value="dia">Dias (ex: Folga/Férias)</option>
                                                </select>
                                            </div>
                                        </div>

                                        {form.tipo === 'horario' ? (
                                            <>
                                                <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>DATA</label><input type="date" className="input-field" value={form.data} onChange={e => setForm({...form, data: e.target.value})} /></div>
                                                <div style={{ display: 'flex', gap: 12 }}>
                                                    <div style={{ flex: 1 }}>
                                                        <label style={{ fontSize: 11, color: 'var(--muted)' }}>INÍCIO</label>
                                                        <select className="input-field" value={form.horarioInicio} onChange={e => setForm({...form, horarioInicio: e.target.value})}>
                                                            {ALL_SLOTS.map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                    <div style={{ flex: 1 }}>
                                                        <label style={{ fontSize: 11, color: 'var(--muted)' }}>FIM</label>
                                                        <select className="input-field" value={form.horarioFim} onChange={e => setForm({...form, horarioFim: e.target.value})}>
                                                            {ALL_SLOTS.map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <div style={{ display: 'flex', gap: 12 }}>
                                                <div style={{ flex: 1 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>DATA INÍCIO</label><input type="date" className="input-field" value={form.dataInicio} onChange={e => setForm({...form, dataInicio: e.target.value})} /></div>
                                                <div style={{ flex: 1 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>DATA FIM</label><input type="date" className="input-field" value={form.dataFim} onChange={e => setForm({...form, dataFim: e.target.value})} /></div>
                                            </div>
                                        )}

                                        <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>MOTIVO</label><input className="input-field" placeholder="Ex: Almoço, Férias, Médico" value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} /></div>
                                    </div>
                                    <div style={{ display:'flex', gap:8 }}>
                                        <button onClick={() => setModal(null)} className="btn-outline">Cancelar</button>
                                        <button onClick={saveBlock} className="btn-primary" disabled={(form.tipo === 'horario' && (!form.data || form.horarioFim <= form.horarioInicio)) || (form.tipo === 'dia' && (!form.dataInicio || form.dataFim < form.dataInicio))}>
                                            Confirmar Bloqueio
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // 3. FINANCEIRO (Apenas Admin)
            const Financeiro = () => {
                const [despesas, setDespesas] = useState(db.despesas || []);
                
                const addDespesa = (e) => {
                    e.preventDefault();
                    const nova = { id: Date.now(), descricao: e.target.desc.value, valor: parseFloat(e.target.valor.value), data: new Date().toISOString().split('T')[0] };
                    const atualizadas = [...despesas, nova];
                    setDespesas(atualizadas); saveDb({ ...db, despesas: atualizadas });
                    e.target.reset();
                };

                const delDespesa = (id) => {
                    const atualizadas = despesas.filter(d => d.id !== id);
                    setDespesas(atualizadas); saveDb({ ...db, despesas: atualizadas });
                };

                return (
                    <div className="fade-in" style={{ padding: 20, paddingBottom: 100 }}>
                        <h2 className="serif" style={{ fontSize: 28, marginBottom: 20 }}>Despesas Fixas</h2>
                        <form className="glass" onSubmit={addDespesa} style={{ display: 'flex', gap: 8, alignItems: 'flex-end', marginBottom: 20 }}>
                            <div style={{ flex: 2 }}><label style={{ fontSize: 10, color: 'var(--muted)', textTransform:'uppercase' }}>Descrição</label><input name="desc" required className="input-field" placeholder="Ex: Aluguel, Luz..." /></div>
                            <div style={{ flex: 1 }}><label style={{ fontSize: 10, color: 'var(--muted)', textTransform:'uppercase' }}>Valor (R$)</label><input name="valor" type="number" step="0.01" required className="input-field" placeholder="0.00" /></div>
                            <button type="submit" className="btn-primary" style={{ width: 'auto', padding: '12px' }}><Icon name="plus" size={18} /></button>
                        </form>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                            {despesas.length === 0 && <p style={{ color: 'var(--muted)', fontSize: 13 }}>Nenhuma despesa registrada.</p>}
                            {despesas.map(d => (
                                <div key={d.id} className="glass" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', margin: 0 }}>
                                    <div><p style={{ fontWeight: 600, fontSize: 14 }}>{d.descricao}</p><p style={{ fontSize: 11, color: 'var(--muted)' }}>{new Date(d.data+'T12:00').toLocaleDateString('pt-BR')}</p></div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}><p style={{ color: 'var(--danger)', fontWeight: 700 }}>R$ {d.valor.toFixed(2)}</p><button onClick={() => delDespesa(d.id)} style={{ background: 'none', border: 'none', color: 'var(--muted)' }}><Icon name="trash" size={16}/></button></div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // 4. CATÁLOGO (Apenas Admin)
            const Catalogo = () => {
                const [catTab, setCatTab] = useState('produtos');
                const list = catTab === 'produtos' ? db.produtos : db.servicos;

                const salvarCatalogo = () => {
                    const updatedItem = { ...form, preco: parseFloat(form.preco) || 0 };
                    const newDb = { ...db };
                    if (modal.type === 'produtos') {
                        updatedItem.estoque = parseInt(form.estoque) || 0;
                        if (modal.isEdit) newDb.produtos = newDb.produtos.map(p => p.id === updatedItem.id ? updatedItem : p);
                        else newDb.produtos.push(updatedItem);
                    } else {
                        if (modal.isEdit) newDb.servicos = newDb.servicos.map(s => s.id === updatedItem.id ? updatedItem : s);
                        else newDb.servicos.push(updatedItem);
                    }
                    saveDb(newDb); setModal(null);
                };

                const deletarCat = (id) => {
                    if(!confirm("Remover do sistema?")) return;
                    const newDb = { ...db };
                    if (catTab === 'produtos') newDb.produtos = newDb.produtos.filter(p => p.id !== id);
                    else newDb.servicos = newDb.servicos.filter(s => s.id !== id);
                    saveDb(newDb);
                };

                return (
                    <div className="fade-in" style={{ padding: 20, paddingBottom: 100 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                            <h2 className="serif" style={{ fontSize: 28 }}>Catálogo</h2>
                            <button onClick={() => { setForm({ id: Date.now(), nome: '', preco: '', categoria: '', img: '', estoque: 0, duracao: '', group: '' }); setModal({ type: catTab, isEdit: false }); }} className="btn-primary" style={{ width: 'auto', padding: '8px 16px' }}>+ Novo</button>
                        </div>
                        <div style={{ display: 'flex', marginBottom: 16, borderBottom: '1px solid var(--border)' }}>
                            <div className={`tab-btn ${catTab === 'produtos' ? 'active' : ''}`} onClick={() => setCatTab('produtos')}>Produtos</div>
                            <div className={`tab-btn ${catTab === 'servicos' ? 'active' : ''}`} onClick={() => setCatTab('servicos')}>Serviços</div>
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                            {list.map(item => (
                                <div key={item.id} className="glass" style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 12, margin: 0 }}>
                                    <div style={{ flex: 1 }}>
                                        <p style={{ fontWeight: 600, fontSize: 14 }}>{item.nome}</p>
                                        <p style={{ fontSize: 12, color: 'var(--gold)' }}>R$ {parseFloat(item.preco).toFixed(2)} {catTab === 'produtos' ? ` • Estoque: ${item.estoque || 0}` : ` • ${item.duracao || ''}`}</p>
                                    </div>
                                    <button onClick={() => { setForm({...item}); setModal({ type: catTab, isEdit: true }); }} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--text)', padding: '6px 12px', borderRadius: 6, cursor: 'pointer', fontSize: 11 }}>Editar</button>
                                    <button onClick={() => deletarCat(item.id)} className="btn-danger">X</button>
                                </div>
                            ))}
                        </div>

                        {modal && (modal.type === 'produtos' || modal.type === 'servicos') && (
                            <div className="modal-overlay">
                                <div className="modal-content">
                                    <h3 className="serif" style={{ fontSize: 22, marginBottom: 16 }}>{modal.isEdit ? 'Editar' : 'Novo'} {modal.type === 'produtos' ? 'Produto' : 'Serviço'}</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
                                        <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>NOME</label><input className="input-field" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} /></div>
                                        <div style={{ display: 'flex', gap: 12 }}>
                                            <div style={{ flex: 1 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>PREÇO (R$)</label><input type="number" step="0.01" className="input-field" value={form.preco} onChange={e => setForm({...form, preco: e.target.value})} /></div>
                                            {modal.type === 'produtos' ? (
                                                <div style={{ flex: 1 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>ESTOQUE</label><input type="number" className="input-field" value={form.estoque} onChange={e => setForm({...form, estoque: e.target.value})} /></div>
                                            ) : (
                                                <div style={{ flex: 1 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>DURAÇÃO</label><input className="input-field" value={form.duracao} onChange={e => setForm({...form, duracao: e.target.value})} /></div>
                                            )}
                                        </div>
                                        <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>CATEGORIA / GRUPO</label><input className="input-field" value={modal.type === 'produtos' ? form.categoria : form.group} onChange={e => modal.type === 'produtos' ? setForm({...form, categoria: e.target.value}) : setForm({...form, group: e.target.value})} /></div>
                                    </div>
                                    <div style={{ display:'flex', gap:8 }}>
                                        <button onClick={() => setModal(null)} className="btn-outline">Cancelar</button>
                                        <button onClick={salvarCatalogo} className="btn-primary" disabled={!form.nome || !form.preco}>Salvar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // 5. EQUIPE (Apenas Admin)
            const Equipe = () => {
                const salvarBarbeiro = () => {
                    const updated = { ...form, comissao: parseFloat(form.comissao) || 0 };
                    const newDb = { ...db };
                    if (modal.isEdit) newDb.barbeiros = newDb.barbeiros.map(b => b.id === updated.id ? updated : b);
                    else newDb.barbeiros.push(updated);
                    saveDb(newDb); setModal(null);
                };

                return (
                    <div className="fade-in" style={{ padding: 20, paddingBottom: 100 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                            <h2 className="serif" style={{ fontSize: 28 }}>Equipe</h2>
                            <button onClick={() => { setForm({ id: Date.now(), nome: '', login: '', senha: '', comissao: 50, especialidade: '', telefone: '' }); setModal({ type: 'equipe', isEdit: false }); }} className="btn-primary" style={{ width: 'auto', padding: '8px 16px' }}>+ Novo</button>
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            {db.barbeiros.map(b => (
                                <div key={b.id} className="glass" style={{ margin: 0 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                        <div><p style={{ fontWeight: 700, fontSize: 16 }}>{b.nome}</p><p style={{ fontSize: 12, color: 'var(--muted)' }}>Login: {b.login}</p></div>
                                        <div style={{ background: 'var(--gold-dim)', color: 'var(--gold)', padding: '4px 12px', borderRadius: 100, fontSize: 12, fontWeight: 700 }}>{b.comissao}%</div>
                                    </div>
                                    <button onClick={() => { setForm({...b}); setModal({ type: 'equipe', isEdit: true }); }} className="btn-outline" style={{ padding: '8px' }}>Editar Perfil / Comissão</button>
                                </div>
                            ))}
                        </div>

                        {modal && modal.type === 'equipe' && (
                            <div className="modal-overlay">
                                <div className="modal-content">
                                    <h3 className="serif" style={{ fontSize: 22, marginBottom: 16 }}>{modal.isEdit ? 'Editar' : 'Novo'} Profissional</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
                                        <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>NOME</label><input className="input-field" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} /></div>
                                        <div style={{ display: 'flex', gap: 12 }}>
                                            <div style={{ flex: 2 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>LOGIN DE ACESSO</label><input className="input-field" value={form.login} onChange={e => setForm({...form, login: e.target.value})} /></div>
                                            <div style={{ flex: 2 }}><label style={{ fontSize: 11, color: 'var(--muted)' }}>SENHA</label><input type="password" className="input-field" value={form.senha} onChange={e => setForm({...form, senha: e.target.value})} /></div>
                                        </div>
                                        <div><label style={{ fontSize: 11, color: 'var(--muted)' }}>COMISSÃO (%)</label><input type="number" className="input-field" value={form.comissao} onChange={e => setForm({...form, comissao: e.target.value})} /></div>
                                    </div>
                                    <div style={{ display:'flex', gap:8 }}>
                                        <button onClick={() => setModal(null)} className="btn-outline">Cancelar</button>
                                        <button onClick={salvarBarbeiro} className="btn-primary" disabled={!form.nome || !form.login}>Salvar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="main-wrap">
                    <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, background: 'rgba(5,5,5,0.95)', backdropFilter: 'blur(10px)', zIndex: 50 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{ width: 32, height: 32, background: 'var(--gold)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#000', fontWeight: 'bold' }}>V</div>
                            <div><h1 className="serif" style={{ fontSize: 18, lineHeight: 1 }}>{user.role === 'admin' ? 'Admin Geral' : 'Portal do Barbeiro'}</h1><p style={{ fontSize: 10, color: 'var(--gold)', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{user.nome}</p></div>
                        </div>
                        <button onClick={logout} style={{ background: 'none', border: 'none', color: 'var(--danger)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600 }}><Icon name="logout" size={18} /> Sair</button>
                    </div>

                    {view === 'dashboard' && <Dashboard />}
                    {view === 'agenda' && <Agenda />}
                    {view === 'financeiro' && user.role === 'admin' && <Financeiro />}
                    {view === 'catalogo' && user.role === 'admin' && <Catalogo />}
                    {view === 'equipe' && user.role === 'admin' && <Equipe />}

                    <div className="nav-sidebar">
                        <div className={`nav-item ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}><Icon n="dashboard" /> Resumo</div>
                        <div className={`nav-item ${view === 'agenda' ? 'active' : ''}`} onClick={() => setView('agenda')}><Icon n="list" /> Agenda</div>
                        {user.role === 'admin' && (
                            <>
                                <div className={`nav-item ${view === 'financeiro' ? 'active' : ''}`} onClick={() => setView('financeiro')}><Icon n="dollar" /> Finanças</div>
                                <div className={`nav-item ${view === 'catalogo' ? 'active' : ''}`} onClick={() => setView('catalogo')}><Icon n="box" /> Catálogo</div>
                                <div className={`nav-item ${view === 'equipe' ? 'active' : ''}`} onClick={() => setView('equipe')}><Icon n="users" /> Equipe</div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('admin-app'));
        root.render(<App />);
    </script>
</body>
</html>
