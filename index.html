<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Victorino Barber | Estilo & Excelência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d98c;
            --gold-dim: rgba(201,168,76,0.15);
            --bg: #0a0a0a;
            --card: #111111;
            --card2: #161616;
            --border: rgba(255,255,255,0.08);
            --text: #e8e8e8;
            --muted: #666;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* Animations */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-16px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
            50% { box-shadow: 0 0 20px 4px rgba(201,168,76,0.3); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .fade-up { animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .fade-up-2 { animation: fadeUp 0.5s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        .fade-up-3 { animation: fadeUp 0.5s 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

        .gold-text {
            background: linear-gradient(135deg, #bf953f, #f0d98c, #b38728, #f0d98c, #c9a84c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% auto;
            animation: shimmer 5s linear infinite;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 4px;
            flex: 1;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            color: var(--muted);
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; transition: all 0.2s; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn.active svg { transform: scale(1.1); }
        .nav-btn .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .nav-btn.active .dot { opacity: 1; }

        /* Header */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.1em; }

        /* Cards */
        .glass {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .glass-hover:hover {
            border-color: rgba(201,168,76,0.4);
            background: var(--card2);
        }

        /* Service Card */
        .service-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }
        .service-card.selected {
            border-color: var(--gold);
            background: var(--card2);
            animation: pulseGold 2s ease-in-out;
        }
        .service-card:hover { transform: translateY(-2px); border-color: rgba(201,168,76,0.3); }

        /* Date chips */
        .date-chip {
            min-width: 72px;
            padding: 10px 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--card);
            flex-shrink: 0;
        }
        .date-chip:hover { border-color: rgba(201,168,76,0.4); }
        .date-chip.selected { background: var(--gold); border-color: var(--gold); color: #000; }
        .date-chip.esgotado { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }

        /* Time chips */
        .time-chip {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--card);
            font-weight: 600;
            font-size: 13px;
        }
        .time-chip:hover { border-color: var(--gold); color: var(--gold); }
        .time-chip.selected { background: var(--gold); border-color: var(--gold); color: #000; }

        /* Inputs */
        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            border-radius: 10px;
            outline: none;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
        .input-field::placeholder { color: var(--muted); }

        /* Buttons */
        .btn-primary {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 12px;
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            font-weight: 600;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 12px;
            padding: 13px 24px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover { background: var(--gold-dim); }

        /* Hero */
        .hero-section {
            height: 100svh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 32px 24px;
            padding-bottom: 100px;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('img/hero_bg.jpg') center/cover no-repeat;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            animation: fadeUp 0.3s ease;
        }
        .notification.success { background: #1a2e1a; color: #5bdd5b; border: 1px solid #2d4f2d; }
        .notification.error { background: #2e1a1a; color: #dd5b5b; border: 1px solid #4f2d2d; }

        /* Stamp */
        .stamp {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Plan card */
        .plan-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s;
        }
        .plan-card.featured {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--card), #1a1508);
        }

        /* Barber card */
        .barber-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 16px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .barber-card.selected {
            border-color: var(--gold);
            background: var(--gold-dim);
        }
        .barber-card img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            transition: all 0.2s;
        }
        .barber-card.selected img { border-color: var(--gold); }

        /* Cart badge */
        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gold);
            color: #000;
            font-size: 9px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Section */
        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }

        /* Sticky bottom bar */
        .sticky-action {
            position: sticky;
            bottom: 72px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            z-index: 50;
            margin: 0 -20px;
        }

        /* Scrollbar for horizontal scroll */
        .scroll-x {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-x::-webkit-scrollbar { display: none; }

        /* Product card */
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s;
        }
        .product-card:hover { transform: translateY(-3px); border-color: rgba(201,168,76,0.3); }

        /* Status pills */
        .status-pending { background: #1a1508; color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
        .status-confirmed { background: #0f1f0f; color: #5bdd5b; border: 1px solid rgba(91,221,91,0.3); }
        .status-canceled { background: #1f0f0f; color: #dd5b5b; border: 1px solid rgba(221,91,91,0.3); }

        /* Loading spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(201,168,76,0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        /* Divider */
        .divider { height: 1px; background: var(--border); }

        /* Main content area with padding for top bar and bottom nav */
        .main-content {
            padding-top: 60px;
            padding-bottom: 80px;
            min-height: 100svh;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a84c',
                        'gold-light': '#f0d98c',
                    }
                }
            }
        }
    </script>
</head>

/* ─── HELPERS ───────────────────────────────────────── */
const getNextDates = () => {
    const dates = [];
    for (let i = 0; i < 14; i++) {
        const d = new Date(); d.setDate(d.getDate() + i); dates.push(d);
    }
    return dates;
};
const maskPhone = v => v.replace(/\D/g, '').replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');

const fmtDateVal = d => d.toISOString().split('T')[0];

const Notif = ({ n }) => n ? <div className={`notification ${n.type}`}>{n.msg}</div> : null;

const Agendar = ({ selectedServices, setSelectedServices, notify, setTab, DATA }) => {
    const [step, setStep] = useState(1);
    const [form, setForm] = useState({ nome: '', telefone: '', barbeiro: null, data: null, horario: null });
    const [agendamentos, setAgendamentos] = useState(() => JSON.parse(localStorage.getItem('vic_agendamentos') || '[]'));
    const [loading, setLoading] = useState(false);

    const total = selectedServices.reduce((a, s) => a + parseFloat(s.preco), 0);
    const getSlots = (date, barberName) => {
            if (!barberName || !date) return [];
            
            // Puxa os agendamentos já marcados
            const booked = agendamentos
                .filter(a => a.date === date && a.barberName === barberName && a.status !== 'cancelado')
                .map(a => a.time);
            
            // Puxa os bloqueios do painel Admin
            const blocks = JSON.parse(localStorage.getItem('vic_bloqueios') || '[]');
            const barberBlocks = blocks.filter(b => b.barberName === barberName);
            
            // 1. Verifica se o DIA INTEIRO está bloqueado (Férias, Atestado, Folga)
            // Checa se a data selecionada cai entre a dataInicio e dataFim
            const isDayBlocked = barberBlocks.some(b => {
                if (b.tipo === 'dia') {
                    return date >= b.dataInicio && date <= b.dataFim;
                }
                return false;
            });

            if (isDayBlocked) return []; // Retorna vazio (Esgotado) se estiver de folga

            // 2. Verifica bloqueios de HORÁRIO (Almoço, Saída rápida) específicos para hoje
            const timeBlocks = barberBlocks.filter(b => b.tipo === 'horario' && b.data === date);
            
            // Libera os horários cruzando os dados
            return ALL_SLOTS.filter(s => {
                // Se já tem agendamento marcado, bloqueia
                if (booked.includes(s)) return false;

                // Verifica se o horário 's' está dentro do intervalo de bloqueio.
                // Ex: Bloqueio das 12:00 às 14:00. O horário 13:00 é bloqueado, mas às 14:00 ele já pode atender.
                const isTimeBlocked = timeBlocks.some(b => {
                    return s >= b.horarioInicio && s < b.horarioFim;
                });

                return !isTimeBlocked; // Se não estiver bloqueado, o horário aparece
            });
        };

    const confirm = async () => {
        setLoading(true);
        await new Promise(r => setTimeout(r, 800));
        const appt = {
            id: Date.now().toString(),
            clientName: form.nome, clientPhone: form.telefone,
            serviceName: selectedServices.map(s => s.nome).join(' + '),
            barberName: form.barbeiro.nome, date: form.data, time: form.horario,
            totalPrice: total, status: 'pendente'
        };
        const all = JSON.parse(localStorage.getItem('vic_agendamentos') || '[]');
        all.push(appt);
        localStorage.setItem('vic_agendamentos', JSON.stringify(all));
        localStorage.setItem('vic_user_phone', form.telefone);
        
        const msg = `💈 *NOVO AGENDAMENTO - VICTORINO*\n\n👤 ${form.nome}\n✂️ ${appt.serviceName}\n👨‍💼 ${form.barbeiro.nome}\n📅 ${new Date(form.data+'T12:00').toLocaleDateString('pt-BR')} às ${form.horario}\n💰 R$ ${total.toFixed(2)}`;
        window.open(`https://wa.me/${form.barbeiro.telefone}?text=${encodeURIComponent(msg)}`, '_blank');

        setLoading(false); notify('Agendamento solicitado com sucesso! ✓');
        setSelectedServices([]); setForm({ nome: '', telefone: '', barbeiro: null, data: null, horario: null });
        setStep(1); setTab('fidelidade');
    };

    const dates = form.barbeiro ? getNextDates().filter(d => {
        const off = DATA.indisponibilidade[form.barbeiro.nome] || [];
        return !off.includes(d.getDay());
    }) : [];

    return (
        <div style={{ padding: '16px 20px', paddingBottom: 100 }}>
            {/* ETAPA 1 */}
            {step === 1 && (
                <div>
                    <h3 className="serif" style={{ fontSize: 24, marginBottom: 4 }}>Escolha os Serviços</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
                        {DATA.servicos.map(s => {
                            const isSel = selectedServices.find(x => x.id === s.id);
                            return (
                                <div key={s.id} className={`service-card ${isSel ? 'selected' : ''}`} onClick={() => setSelectedServices(prev => prev.find(x => x.id === s.id) ? prev.filter(x => x.id !== s.id) : [...prev, s])} style={{ display: 'flex', alignItems: 'center', overflow: 'hidden' }}>
                                    <div style={{ width: 72, height: 64, flexShrink: 0 }}><img src={s.img} alt={s.nome} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e=>e.target.style.background='#222'} /></div>
                                    <div style={{ flex: 1, padding: '10px 14px' }}><p style={{ fontWeight: 600, fontSize: 13 }}>{s.nome}</p><p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>{s.duracao}</p></div>
                                    <div style={{ padding: '0 14px', display: 'flex', alignItems: 'center', gap: 12 }}><span style={{ color: 'var(--gold)', fontWeight: 700, fontSize: 13 }}>R$ {parseFloat(s.preco).toFixed(2)}</span><div style={{ width: 22, height: 22, borderRadius: '50%', border: `2px solid ${isSel ? 'var(--gold)' : 'var(--border)'}`, background: isSel ? 'var(--gold)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{isSel && <Icon name="check" size={12} style={{ color: '#000' }}/>}</div></div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
            {/* ETAPA 2 */}
            {step === 2 && (
                <div>
                    <h3 className="serif" style={{ fontSize: 24, marginBottom: 4 }}>Escolha o Profissional</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                        {DATA.barbeiros.map(b => (
                            <div key={b.id} className={`barber-card ${form.barbeiro?.id === b.id ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, barbeiro: b, data: null, horario: null }))} style={{ flexDirection: 'row', gap: 16, textAlign: 'left' }}>
                                <img src={b.img} alt={b.nome} style={{ width: 56, height: 56, borderRadius: '50%', objectFit: 'cover', border: `2px solid ${form.barbeiro?.id === b.id ? 'var(--gold)' : 'var(--border)'}`, flexShrink: 0 }} onError={e=>e.target.src='https://via.placeholder.com/56'} />
                                <div style={{ flex: 1 }}><p style={{ fontWeight: 600, fontSize: 15 }}>{b.nome}</p><p style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{b.especialidade}</p></div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            {/* ETAPA 3 */}
            {step === 3 && (
                <div>
                    <h3 className="serif" style={{ fontSize: 24, marginBottom: 4 }}>Data & Horário</h3>
                    <div className="scroll-x" style={{ marginBottom: 24 }}>
                        {dates.map((d, i) => {
                            const val = fmtDateVal(d); const slots = getSlots(val, form.barbeiro?.nome);
                            const isEsgotado = slots.length === 0; const isSel = form.data === val;
                            return (
                                <div key={i} className={`date-chip ${isSel ? 'selected' : ''} ${isEsgotado ? 'esgotado' : ''}`} onClick={() => !isEsgotado && setForm(f => ({ ...f, data: val, horario: null }))}>
                                    <p style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', opacity: 0.7, marginBottom: 2 }}>{fmtWeekday(d)}</p>
                                    <p style={{ fontSize: 15, fontWeight: 700 }}>{fmtDate(d)}</p>
                                </div>
                            );
                        })}
                    </div>
                    {form.data && (
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
                            {getSlots(form.data, form.barbeiro?.nome).map(s => (
                                <div key={s} className={`time-chip ${form.horario === s ? 'selected' : ''}`} onClick={() => setForm(f => ({ ...f, horario: s }))}>{s}</div>
                            ))}
                        </div>
                    )}
                </div>
            )}
            {/* ETAPA 4 */}
            {step === 4 && (
                <div>
                    <h3 className="serif" style={{ fontSize: 24, marginBottom: 20 }}>Seus Dados</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 24 }}>
                        <div><label style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase' }}>Seu Nome</label><input type="text" className="input-field" placeholder="Nome completo" value={form.nome} onChange={e => setForm(f => ({ ...f, nome: e.target.value }))} /></div>
                        <div><label style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase' }}>WhatsApp</label><input type="tel" className="input-field" placeholder="(00) 00000-0000" value={form.telefone} onChange={e => setForm(f => ({ ...f, telefone: maskPhone(e.target.value) }))} maxLength={15} /></div>
                    </div>
                </div>
            )}

            <div style={{ display: 'flex', gap: 12, marginTop: 16 }}>
                {step > 1 && <button className="btn-outline" onClick={() => setStep(s => s - 1)} style={{ flex: 1 }}>Voltar</button>}
                {step < 4 ? <button className="btn-primary" onClick={() => setStep(s => s + 1)} disabled={(step===1 && selectedServices.length===0)||(step===2 && !form.barbeiro)||(step===3 && (!form.data || !form.horario))} style={{ flex: 1 }}>Continuar</button>
                          : <button className="btn-primary" onClick={confirm} disabled={loading || !form.nome} style={{ flex: 1 }}>{loading ? 'Confirmando...' : 'Confirmar ✓'}</button>}
            </div>
        </div>
    );
};

                        <div style={{ height: 140, overflow: 'hidden', position: 'relative' }}>
                            <img src={p.img} alt={p.nome} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e=>e.target.style.background='#222'} />
                            <div style={{ position: 'absolute', bottom: 8, right: 8 }}><button onClick={() => addToCart(p)} style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--gold)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="plus" size={16} style={{ stroke: '#000' }} /></button></div>
                        </div>
                        <div style={{ padding: '12px 12px' }}><p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 2 }}>{p.sub}</p><p style={{ fontWeight: 600, fontSize: 13, marginBottom: 4, lineHeight: 1.3 }}>{p.nome}</p><p style={{ color: 'var(--gold)', fontWeight: 700, fontSize: 14 }}>R$ {parseFloat(p.preco).toFixed(2)}</p></div>
                    </div>
                ))}
            </div>
        </div>
    );
};

const Fidelidade = ({ setTab }) => {
    // Código inalterado...
    return <div style={{ padding: '16px 20px' }}><p className="section-label">Clube de</p><h2 className="serif" style={{ fontSize: 28 }}>Fidelidade</h2><p style={{ marginTop: 20, color: 'var(--muted)' }}>Você ainda não ativou seu cartão.</p></div>;
};

/* ─── APP ROOT ──────────────────────────────────────── */
const App = () => {
    const [tab, setTab] = useState('home');
    const [notification, setNotification] = useState(null);
    const [selectedServices, setSelectedServices] = useState([]);
    
    // O CORAÇÃO DO SISTEMA: Lendo os dados do LocalStorage (que o admin atualiza)
    const [sysData, setSysData] = useState(() => JSON.parse(localStorage.getItem('vic_data')) || INITIAL_DATA);
    
    // Sincronizando o carrinho
    const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('vic_cart') || '[]'));

    const notify = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3500); };
    const cartCount = cart.reduce((a, i) => a + i.qty, 0);

    // ESCUTA EM TEMPO REAL: se o admin salvar algo, o app do cliente atualiza!
    useEffect(() => {
        const syncStorage = () => {
            setSysData(JSON.parse(localStorage.getItem('vic_data')) || INITIAL_DATA);
            setCart(JSON.parse(localStorage.getItem('vic_cart') || '[]'));
        };
        window.addEventListener('storage', syncStorage);
        return () => window.removeEventListener('storage', syncStorage);
    }, []);

    useEffect(() => { window.scrollTo(0, 0); }, [tab]);

    return (
        <>
            <Notif n={notification} />
            <div className="top-bar">
                <span className="logo-text gold-text">VICTORINO</span>
                <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>{tab !== 'agendar' && <button className="btn-primary" onClick={() => setTab('agendar')} style={{ padding: '8px 16px', fontSize: 11 }}>Agendar</button>}</div>
            </div>
            <div className="main-content">
                {/* INJETANDO O sysData NOS COMPONENTES PARA QUE ELES REAJAM A QUALQUER MUDANÇA */}
                {tab === 'home' && <Home setTab={setTab} setSelectedServices={setSelectedServices} DATA={sysData} />}
                {tab === 'servicos' && <Servicos selected={selectedServices} setSelected={setSelectedServices} setTab={setTab} DATA={sysData} />}
                {tab === 'planos' && <Planos notify={notify} DATA={sysData} />}
                {tab === 'loja' && <Loja notify={notify} DATA={sysData} />}
                {tab === 'fidelidade' && <Fidelidade setTab={setTab} />}
                {tab === 'agendar' && <Agendar selectedServices={selectedServices} setSelectedServices={setSelectedServices} notify={notify} setTab={setTab} DATA={sysData} />}
            </div>
            <BottomNav tab={tab} setTab={setTab} cartCount={cartCount} />
        </>
    );
};

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
    </script>
</body>
</html>
