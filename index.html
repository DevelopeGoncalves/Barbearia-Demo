    <style>
        /* --- ESTILOS GERAIS (VICTORINO THEME) --- */
        :root {
            --gold-primary: #d4af37;
            --gold-dark: #aa8420;
            --gold-light: #fcf6ba;
            --bg-dark: #080808;
            --bg-card: #121212;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: #e5e5e5;
            overflow-x: hidden;
        }

        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }

        /* Scrollbar de Luxo */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

        /* Efeitos Visuais */
        .text-gold-gradient {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shimmer 6s linear infinite;
        }

        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .glass-hover:hover { background: rgba(212, 175, 55, 0.05); border-color: var(--gold-primary); }
        
        /* Accordion Details Marker */
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* Inputs Customizados */
        .input-vic {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .input-vic:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        
        /* Ajuste para a Logo */
        .logo-img {
            height: 50px; 
            width: auto;
            object-fit: contain;
        }
    </style>

            // --- HELPER FUNCTIONS PARA AGENDAMENTO ---
            const getNextDates = () => {
                const dates = [];
                const today = new Date();
                for (let i = 0; i < 14; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    dates.push(d);
                }
                return dates;
            };

            const formatDateDisplay = (date) => {
                const diaSemana = date.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
                const diaMes = date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                return { diaSemana, diaMes };
            };

            const formatDateValue = (date) => date.toISOString().split('T')[0];

            // --- LOGICA GERAL ---
            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const maskPhone = (v) => v.replace(/\D/g,"").replace(/^(\d{2})(\d{5})(\d{4}).*/,"($1) $2-$3");
            const getDayOfWeek = (dateString) => new Date(dateString + 'T12:00:00').getDay();

            const groupServices = (services) => {
                return services.reduce((acc, service) => {
                    const groupName = service.group || 'Geral';
                    if (!acc[groupName]) acc[groupName] = [];
                    acc[groupName].push(service);
                    return acc;
                }, {});
            };

            const calculateTotal = () => carrinho.reduce((acc, item) => acc + (item.preco * item.quantidade), 0).toFixed(2);
            const calculateServiceTotal = () => selectedServices.reduce((acc, s) => acc + s.preco, 0).toFixed(2);

            const getAvailableSlots = (date, barberName) => {
                if (!barberName || !date) return [];
                const bookedTimes = agendamentos
                    .filter(appt => appt.date === date && appt.barberName === barberName)
                    .map(appt => appt.time);
                return ALL_SLOTS.filter(slot => !bookedTimes.includes(slot));
            };

            // --- 🧠 MOTOR DE SINCRONIZAÇÃO DE ESTOQUE (COLE AQUI) ---
            useEffect(() => {

                    let adminEstoqueStr = localStorage.getItem('victorino_admin_estoque');
                    let estoqueAdminAtualizado = [];

                    if (!adminEstoqueStr || JSON.parse(adminEstoqueStr).length === 0) {
                        estoqueAdminAtualizado = DATA_STORE.produtos.map(p => ({
                            id: p.id, nome: p.nome, custo: p.preco * 0.5, preco: p.preco, categoria: p.categoria, quantidade: 5
                        }));
                        localStorage.setItem('victorino_admin_estoque', JSON.stringify(estoqueAdminAtualizado));
                    } else {
                        estoqueAdminAtualizado = JSON.parse(adminEstoqueStr);
                        let teveMudanca = false;
                        DATA_STORE.produtos.forEach(p => {
                            if (!estoqueAdminAtualizado.find(e => e.id === p.id)) {

                            }
                        });
                        if (teveMudanca) localStorage.setItem('victorino_admin_estoque', JSON.stringify(estoqueAdminAtualizado));
                    }

                    const produtosSincronizados = estoqueAdminAtualizado.map(itemAdmin => {
                        const original = DATA_STORE.produtos.find(p => p.id === itemAdmin.id) || {};
                        return { ...original, ...itemAdmin, subcategoria: original.subcategoria || 'Outros', imgPath: original.imgPath || './img/logo.png' };
                    });

                    setProdutosLoja(produtosSincronizados);
                };

                syncEstoque();
                window.addEventListener('storage', syncEstoque);
                return () => window.removeEventListener('storage', syncEstoque);
            }, []);
            // --------------------------------------------------------

            // --- LOCAL STORAGE (PERSISTÊNCIA DO CARRINHO) ---
            useEffect(() => {
                const salvo = localStorage.getItem('victorino_cart');
                if (salvo) setCarrinho(JSON.parse(salvo));
            }, []);

            useEffect(() => {
                localStorage.setItem('victorino_cart', JSON.stringify(carrinho));
            }, [carrinho]);

            // --- FIREBASE LOAD ---
            useEffect(() => {
                const loadData = async () => {
                    if (!db) return; 
                    try {
                        const todayDate = new Date().toISOString().slice(0, 10);
                        const snap = await db.collection("agendamentos").where("date", ">=", todayDate).get();
                        setAgendamentos(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                        const mySnap = await db.collection("agendamentos")
                            .where("userId", "==", USER_ID_SIMULADO)
                            .orderBy("date", "desc")
                            .get();
                        setMyAppointments(mySnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    } catch (e) { console.error("Erro ao carregar dados", e); }
                };
                loadData();
            }, []);

            // --- LÓGICA ---

            const toggleCarrinho = (produto) => {
                setCarrinho(prev => {
                    const exists = prev.find(p => p.id === produto.id);
                    if (exists) return prev.map(p => p.id === produto.id ? { ...p, quantidade: p.quantidade + 1 } : p);
                    return [...prev, { ...produto, quantidade: 1 }];
                });
                showNotification(`"${produto.nome}" adicionado.`);
            };

            const finalizarCompra = () => {
                const barbeiroDiego = DATA_STORE.barbeiros.find(b => b.nome === 'Victorino');
                const telefone = barbeiroDiego ? barbeiroDiego.telefone : '5527999064068';
                
                let msg = `🛍️ *PEDIDO LOJA VICTORINO*\n\n`;
                carrinho.forEach(item => msg += `▪ ${item.quantidade}x ${item.nome} (R$ ${item.preco.toFixed(2)})\n`);
                msg += `\n*TOTAL: R$ ${calculateTotal()}*\n\nAguardo instruções.`;

                // --- 🔌 INTEGRAÇÃO COM O PDV ADMIN (NOVO) ---
                const vendasSalvas = localStorage.getItem('victorino_admin_vendas');
                const vendasAtuais = vendasSalvas ? JSON.parse(vendasSalvas) : [];
                
                // Transforma os itens do carrinho no formato que o Admin (Caixa) entende
                const novasVendas = carrinho.map((item, index) => ({
                    id: Date.now() + index, // Cria um ID único
                    type: 'produto',
                    description: `${item.quantidade}x ${item.nome} (Loja Online)`,
                    price: item.preco * item.quantidade,
                    method: 'A Confirmar (WhatsApp)', // Fica como a confirmar até o dono ver
                    date: new Date().toISOString().split('T')[0],
                    time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                }));

                // Salva no banco de dados local do Admin
                localStorage.setItem('victorino_admin_vendas', JSON.stringify([...vendasAtuais, ...novasVendas]));
                // ---------------------------------------------

                // Abre o WhatsApp
                window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`, '_blank');
                
                // Limpa o carrinho e avisa o cliente
                setCarrinho([]);
                showNotification("Pedido enviado para a barbearia!");
            };

            const toggleService = (service) => {
                setSelectedServices(prev => {
                    const exists = prev.find(s => s.id === service.id);
                    return exists ? prev.filter(s => s.id !== service.id) : [...prev, service];
                });
            };

            const confirmarAgendamento = async () => {
                const rawPhone = form.telefone.replace(/\D/g, '');
                
                if(!form.nome || rawPhone.length < 10 || selectedServices.length === 0 || !form.barbeiro || !form.data || !form.horario) {
                    showNotification("Preencha todos os campos e selecione serviços.", "error");
                    return;
                }

                const serviceNames = selectedServices.map(s => s.nome).join(' + ');
                localStorage.setItem('victorino_user_phone', form.telefone);
                
                // 1. MONTA OS DADOS NO FORMATO QUE O ADMIN LÊ
                const apptData = {
                    id: Date.now().toString(),
                    clientName: form.nome,
                    clientPhone: form.telefone,
                    serviceName: serviceNames,
                    barberName: form.barbeiro,
                    date: form.data,
                    time: form.horario,
                    totalPrice: parseFloat(calculateServiceTotal()),
                    status: 'pendente'
                };

                // 2. SALVA NO LOCALSTORAGE COMPARTILHADO COM O ADMIN
                const historicoAdmin = localStorage.getItem('victorino_admin_agendamentos');
                const agendamentosAtuais = historicoAdmin ? JSON.parse(historicoAdmin) : [];
                agendamentosAtuais.push(apptData);
                localStorage.setItem('victorino_admin_agendamentos', JSON.stringify(agendamentosAtuais));

                // 3. ABRE O WHATSAPP (Opcional, mantive para não quebrar seu fluxo)
                const barbeiro = DATA_STORE.barbeiros.find(b => b.nome === form.barbeiro);
                const msg = `💈 *NOVO AGENDAMENTO - VICTORINO*\n\n👤 ${form.nome}\n✂️ ${serviceNames}\n📅 ${new Date(form.data+'T12:00').toLocaleDateString('pt-BR')} às ${form.horario}\n💰 R$ ${apptData.totalPrice}`;
                window.open(`https://wa.me/${barbeiro.telefone}?text=${encodeURIComponent(msg)}`, '_blank');

                // 4. LIMPA O FORMULÁRIO E MOSTRA SUCESSO
                showNotification("Agendamento Solicitado!");
                setForm({ ...form, horario: '', data: '' });
                setSelectedServices([]);
                setActiveTab('fidelidade');
                
                // 5. ATUALIZA A TELA DO CLIENTE
                setMyAppointments(prev => [apptData, ...prev]);
            };

            const cancelarAgendamento = async (id) => {
                if (db) await db.collection("agendamentos").doc(id).delete();
                setMyAppointments(prev => prev.filter(a => a.id !== id));
                showNotification("Agendamento cancelado.");
            };

            const renderStoreContent = () => {
                if (storeCategory && storeSubCategory) {
                    // FILTRO DE BUSCA
                    // Lê do produtosLoja ao invés do DATA_STORE
                    const products = produtosLoja.filter(p => 
                        p.categoria === storeCategory && 
                        p.subcategoria === storeSubCategory &&
                        p.nome.toLowerCase().includes(searchTerm.toLowerCase())
                    );

                    return (
                        <div className="fade-in">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                <button onClick={() => { setStoreSubCategory(null); setSearchTerm(''); }} className="text-vic-gold hover:text-white flex items-center gap-2">← Voltar para Subcategorias</button>
                                <input type="text" placeholder={`Buscar em ${storeSubCategory}...`} className="bg-black/50 border border-vic-gold/30 rounded px-4 py-2 text-white text-sm focus:border-vic-gold outline-none w-full md:w-64" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>

                            <h3 className="text-3xl text-white font-serif mb-8">{storeSubCategory}</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {products.length > 0 ? products.map(p => (
                                    <div key={p.id} className={`glass p-4 rounded-lg transition group relative ${p.quantidade <= 0 ? 'opacity-50 grayscale' : 'hover:border-vic-gold'}`}>
                                        
                                        {/* ETIQUETAS DE ESTOQUE */}
                                        {p.quantidade <= 0 ? (
                                            <span className="absolute top-2 left-2 bg-vic-red text-white text-[10px] font-bold px-2 py-1 uppercase tracking-widest z-10">Esgotado</span>
                                        ) : p.quantidade <= 3 ? (
                                            <span className="absolute top-2 left-2 bg-yellow-600 text-white text-[10px] font-bold px-2 py-1 uppercase tracking-widest z-10">Restam {p.quantidade}</span>
                                        ) : null}
                                        
                                        <div className="h-48 overflow-hidden rounded mb-4 relative bg-black">
                                            <img src={p.imgPath} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" onError={(e) => { e.target.src = './img/logo.png'; e.target.style.objectFit = 'contain'; }} />
                                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                                {p.quantidade > 0 ? (
                                                    <button onClick={() => toggleCarrinho(p)} className="bg-vic-gold text-black px-4 py-2 font-bold uppercase text-xs">Adicionar</button>
                                                ) : (
                                                    <span className="bg-black text-white px-4 py-2 font-bold uppercase text-xs cursor-not-allowed">Indisponível</span>
                                                )}
                                            </div>
                                        </div>
                                        <h4 className="text-white font-serif">{p.nome}</h4>
                                        <p className="text-vic-gold font-bold">R$ {p.preco.toFixed(2)}</p>
                                    </div>
                                )) : <p className="text-gray-500 col-span-4 text-center py-12">Nenhum produto encontrado com este nome.</p>}
                            </div>
                        </div>
                    );
                }
                
                if (storeCategory) {
                    return (
                        <div className="fade-in">
                            <button onClick={() => setStoreCategory(null)} className="mb-6 text-vic-gold hover:text-white flex items-center gap-2">← Voltar para Categorias</button>
                            <h3 className="text-3xl text-white font-serif mb-8">{storeCategory}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {SHOP_SUBCATEGORIES[storeCategory]?.map(sub => (
                                    <button 
                                        key={sub.name}
                                        onClick={() => setStoreSubCategory(sub.name)}
                                        className="glass p-8 text-center rounded-lg hover:bg-white/5 transition group"
                                    >
                                        <div className="text-4xl mb-4 text-vic-gold group-hover:scale-110 transition">{sub.icon}</div>
                                        <span className="text-lg font-serif">{sub.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 fade-in">
                        {SHOP_CATEGORIES.map(cat => (
                            <div 
                                key={cat.id} 
                                onClick={() => setStoreCategory(cat.id)}
                                className="group cursor-pointer relative h-80 rounded-lg overflow-hidden border border-white/10 hover:border-vic-gold transition-all duration-500"
                            >
                                <img src={cat.img} className="w-full h-full object-cover transition duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center group-hover:bg-black/40 transition">
                                    <span className="text-5xl mb-4">{cat.icon}</span>
                                    <h3 className="text-2xl font-serif text-white uppercase tracking-widest">{cat.title}</h3>
                                    <span className="mt-4 text-vic-gold text-xs opacity-0 group-hover:opacity-100 transition transform translate-y-4 group-hover:translate-y-0">Ver Produtos</span>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative pb-20">
                    
                    {/* NAVBAR */}
                    <nav className="fixed w-full z-50 bg-black/95 backdrop-blur-md border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                {/* IMAGEM DA LOGO CORRIGIDA */}
                                <img src="./img/logo.png" alt="Victorino Logo" className="logo-img" />
                                <div>
                                    <h1 className="text-xl font-serif text-white tracking-widest leading-none">VICTORINO</h1>
                                    <p className="text-[10px] text-vic-gold uppercase tracking-[0.4em] leading-none mt-1">Barber & Co.</p>
                                </div>
                            </div>

                            <div className="hidden md:flex gap-2">
                                <NavButton active={activeTab === 'home'} onClick={() => setActiveTab('home')}>Início</NavButton>
                                <NavButton active={activeTab === 'servicos'} onClick={() => setActiveTab('servicos')}>Serviços</NavButton>
                                <NavButton active={activeTab === 'loja'} onClick={() => setActiveTab('loja')}>Loja</NavButton>
                                <NavButton active={activeTab === 'meus-agendamentos'} onClick={() => setActiveTab('meus-agendamentos')}>Meus Horários</NavButton>
                                <NavButton active={activeTab === 'agendar'} onClick={() => setActiveTab('agendar')}>Agendar</NavButton>
                            </div>

                            <div className="flex items-center gap-4">
                                {carrinho.length > 0 && (
                                    <button onClick={() => setActiveTab('loja')} className="relative text-vic-gold animate-bounce">
                                        <span className="text-xl">🛍️</span>
                                        <span className="absolute -top-2 -right-2 bg-vic-red text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">
                                            {carrinho.reduce((a,b) => a + b.quantidade, 0)}
                                        </span>
                                    </button>
                                )}
                                <button className="md:hidden text-2xl text-vic-gold" onClick={() => setMenuOpen(!menuOpen)}>☰</button>
                            </div>
                        </div>
                        {menuOpen && (
                            <div className="md:hidden bg-vic-card border-b border-vic-gold animate-fadeIn">
                                {['home', 'servicos', 'loja', 'agendar', 'fidelidade'].map(item => (
                                    <button 
                                        key={item}
                                        onClick={() => { setActiveTab(item); setMenuOpen(false); }}
                                        className="block w-full text-left p-4 uppercase text-sm tracking-widest border-b border-white/5 text-gray-300 hover:bg-white/5 transition"
                                    >
                                        {item.replace('-', ' ')}
                                    </button>
                                ))}
                            </div>
                        )}
                    </nav>

                    {notification && (
                        <div className="fixed top-24 right-4 z-[60] animate-fadeIn">
                            <div className={`px-6 py-4 rounded shadow-2xl border-l-4 ${notification.type === 'error' ? 'bg-red-900/90 border-red-500' : 'bg-zinc-800/90 border-vic-gold'} text-white backdrop-blur-md`}>
                                {notification.msg}
                            </div>
                        </div>
                    )}

                    <main className="pt-20">
                        
                        {/* HOME */}
                        {activeTab === 'home' && (
                            <>
                                <header className="relative h-[85vh] flex items-center justify-center bg-hero-pattern bg-cover bg-center bg-fixed">
                                    <div className="absolute inset-0 bg-gradient-to-t from-vic-bg via-black/70 to-black/40"></div>
                                    <div className="relative z-10 text-center px-4 fade-in">
                                        <div className="mb-6 flex justify-center">
                                            {/* IMAGEM DA LOGO */}
                                            <img src="./img/logo.png" alt="Victorino" className="h-32 w-auto object-contain animate-[fadeIn_1.5s_ease-out]" />
                                        </div>
                                        <p className="text-vic-gold text-sm md:text-base uppercase tracking-[0.5em] mb-4">Estilo • Atitude • Excelência</p>
                                        <h1 className="text-5xl md:text-8xl font-serif text-white mb-6">
                                            Victorino <br/> <span className="text-gold-gradient italic text-4xl md:text-7xl">Barber Shop</span>
                                        </h1>
                                        <div className="flex flex-col md:flex-row gap-4 justify-center mt-8">
                                            <Button onClick={() => setActiveTab('agendar')}>Agendar Horário</Button>
                                            <Button variant="outline" onClick={() => setActiveTab('loja')}>Ver Produtos</Button>
                                        </div>
                                    </div>
                                </header>
                                
                                <section className="py-20 px-6 max-w-6xl mx-auto">
                                    <SectionTitle title="Nossa Equipe" subtitle="Os Mestres" />
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {DATA_STORE.barbeiros.map(barbeiro => (
                                            <div key={barbeiro.id} className="glass p-8 text-center rounded-lg glass-hover transition-all duration-300 group">
                                                {/* MODIFICAÇÃO: FOTO DO BARBEIRO (PERFIL) */}
                                                <div className="w-32 h-32 mx-auto mb-4 rounded-full p-1 border border-vic-gold/50">
                                                    <img 
                                                        src={barbeiro.imgPath} 
                                                        alt={barbeiro.nome}
                                                        className="w-full h-full rounded-full object-cover filter grayscale group-hover:grayscale-0 transition duration-500 transform group-hover:scale-110"
                                                        onError={(e) => { e.target.src = 'https://via.placeholder.com/150'; }} 
                                                    />
                                                </div>
                                                <h3 className="text-2xl text-white font-serif mb-2">{barbeiro.nome}</h3>
                                                <p className="text-vic-gold text-xs uppercase tracking-widest mb-4">{barbeiro.especialidade}</p>
                                                <p className="text-gray-500 text-sm italic">"{barbeiro.bio}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </>
                        )}

                        {/* SERVIÇOS - REDESENHADO (CARDS APP-LIKE) */}
                        {activeTab === 'servicos' && (
                            <div className="py-20 px-6 max-w-6xl mx-auto fade-in">
                                <SectionTitle title="Menu de Serviços" subtitle="Escolha seu estilo" />
                                
                                <p className="text-center text-gray-400 text-sm mb-10">Toque nos serviços desejados para montar seu pacote.</p>

                                {Object.keys(groupServices(DATA_STORE.servicos)).map(group => (
                                    <div key={group} className="mb-12">
                                        {/* Título da Categoria */}
                                        <div className="flex items-center gap-4 mb-6">
                                            <h3 className="font-serif text-2xl text-vic-gold">{group}</h3>
                                            <div className="h-[1px] flex-1 bg-gradient-to-r from-vic-gold/30 to-transparent"></div>
                                        </div>

                                        {/* Grid de Cards (2 colunas no celular, 3/4 no PC) */}
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
                                            {groupServices(DATA_STORE.servicos)[group].map(servico => {
                                                const isSelected = selectedServices.some(s => s.id === servico.id);
                                                return (
                                                    <div 
                                                        key={servico.id} 
                                                        onClick={() => toggleService(servico)}
                                                        className={`relative p-4 rounded-xl cursor-pointer transition-all duration-300 flex flex-col justify-between min-h-[150px] group overflow-hidden select-none
                                                            ${isSelected 
                                                                ? 'bg-gradient-to-br from-vic-gold/20 to-black border-2 border-vic-gold shadow-[0_0_15px_rgba(212,175,55,0.3)] transform scale-[1.02]' 
                                                                : 'bg-vic-card border border-white/5 hover:border-vic-gold/50 hover:bg-white/5'}
                                                        `}
                                                    >
                                                        {/* Bolinha de "Selecionado" (Checkmark) */}
                                                        <div className={`absolute top-3 right-3 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-300 z-10
                                                            ${isSelected ? 'bg-vic-gold border-vic-gold text-black shadow-lg scale-100' : 'border-white/20 text-transparent scale-90 group-hover:border-vic-gold/50'}
                                                        `}>
                                                            <span className="text-xs font-bold">✓</span>
                                                        </div>

                                                        {/* Ícone e Nome */}
                                                        <div className="mb-4 pr-6">
                                                            <span className={`text-4xl block mb-3 transition-transform origin-left ${isSelected ? 'scale-110' : 'group-hover:scale-110'}`}>{servico.icon}</span>
                                                            <h4 className={`font-serif text-sm md:text-base leading-tight mb-1 ${isSelected ? 'text-vic-gold font-bold' : 'text-white'}`}>{servico.nome}</h4>
                                                            <span className="text-[10px] text-gray-500 uppercase tracking-widest flex items-center gap-1">⏱ {servico.duracao}</span>
                                                        </div>

                                                        {/* Preço */}
                                                        <div className="mt-auto pt-3 border-t border-white/10">
                                                            <span className={`font-bold text-lg ${isSelected ? 'text-white' : 'text-vic-green'}`}>R$ {servico.preco.toFixed(2)}</span>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}

                                {/* Barra Fixa Inferior (Carrinho de Serviços) */}
                                <div className="fixed bottom-0 left-0 w-full p-4 bg-black/95 backdrop-blur-md border-t border-vic-gold/50 flex justify-between items-center z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
                                    <div className="pl-2 md:pl-8">
                                        <p className="text-gray-400 text-[10px] md:text-xs uppercase tracking-widest">Total do Pacote</p>
                                        <div className="flex items-baseline gap-2">
                                            <p className="text-2xl md:text-3xl text-white font-serif">R$ {calculateServiceTotal()}</p>
                                            {selectedServices.length > 0 && (
                                                <span className="text-vic-gold text-xs font-bold bg-vic-gold/10 px-2 py-1 rounded">
                                                    {selectedServices.length} {selectedServices.length === 1 ? 'serviço' : 'serviços'}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="pr-2 md:pr-8">
                                        <button 
                                            onClick={() => setActiveTab('agendar')} 
                                            disabled={selectedServices.length === 0}
                                            className={`px-6 py-3 md:px-8 md:py-4 uppercase tracking-widest font-bold text-xs md:text-sm rounded transition-all duration-300 transform
                                                ${selectedServices.length === 0 
                                                    ? 'bg-gray-800 text-gray-500 cursor-not-allowed' 
                                                    : 'bg-vic-gold text-black hover:bg-white hover:scale-105 shadow-[0_0_20px_rgba(212,175,55,0.4)]'
                                                }`}
                                        >
                                            Agendar Horário
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* LOJA */}
                        {activeTab === 'loja' && (
                            <div className="py-20 px-6 max-w-7xl mx-auto">
                                <SectionTitle title="Victorino Store" subtitle="Produtos Premium" />
                                
                                {carrinho.length > 0 && (
                                    <div className="mb-12 glass p-6 border-l-4 border-vic-gold flex flex-col md:flex-row justify-between items-center gap-4 sticky top-24 z-30">
                                        <div>
                                            <h3 className="text-white font-bold text-lg">Seu Carrinho ({carrinho.reduce((a,b)=>a+b.quantidade,0)} itens)</h3>
                                            <p className="text-vic-muted text-sm">Total: <span className="text-vic-gold font-bold">R$ {calculateTotal()}</span></p>
                                        </div>
                                        <Button onClick={finalizarCompra}>Finalizar no WhatsApp</Button>
                                    </div>
                                )}
                                
                                {renderStoreContent()}
                            </div>
                        )}

                        {/* AGENDAR */}
                        {activeTab === 'agendar' && (
                            <div className="py-20 px-6 max-w-3xl mx-auto fade-in">
                                <SectionTitle title="Agendamento" subtitle="Reserve seu momento" />
                                
                                <div className="glass p-8 md:p-12 rounded-lg border-t-4 border-vic-gold">
                                    
                                    {/* Resumo dos Serviços */}
                                    <div className="mb-8 p-4 border border-white/10 rounded bg-black/40">
                                        <h4 className="text-vic-gold text-xs uppercase tracking-widest mb-2">Serviços Selecionados</h4>
                                        {selectedServices.length > 0 ? (
                                            <div className="flex flex-wrap gap-2">
                                                {selectedServices.map(s => (
                                                    <span key={s.id} className="bg-vic-gold/20 text-vic-gold px-3 py-1 rounded text-sm border border-vic-gold/30">
                                                        {s.nome}
                                                    </span>
                                                ))}
                                            </div>
                                        ) : (
                                            <p className="text-gray-500 text-sm">Nenhum serviço selecionado. <button onClick={() => setActiveTab('servicos')} className="text-vic-gold underline">Ir para Serviços</button></p>
                                        )}
                                    </div>

                                    <div className="space-y-8">
                                        {/* 1. Dados Pessoais */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="text-xs text-gray-400 uppercase tracking-widest block mb-2">Seu Nome</label>
                                                <input type="text" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} className="input-vic rounded" placeholder="Nome Completo" />
                                            </div>
                                            <div>
                                                <label className="text-xs text-gray-400 uppercase tracking-widest block mb-2">WhatsApp</label>
                                                <input type="text" value={form.telefone} onChange={e => setForm({...form, telefone: maskPhone(e.target.value)})} className="input-vic rounded" placeholder="(00) 00000-0000" maxLength="15" />
                                            </div>
                                        </div>

                                        <div className="w-full h-[1px] bg-white/10"></div>

                                        {/* 2. Seleção de Barbeiro (AGORA VEM PRIMEIRO) */}
                                        <div>
                                            <label className="text-xs text-vic-gold uppercase tracking-widest block mb-4">1. Escolha o Profissional</label>
                                            <div className="grid grid-cols-3 gap-3">
                                                {DATA_STORE.barbeiros.map(b => (
                                                    <button 
                                                        key={b.id}
                                                        onClick={() => setForm({...form, barbeiro: b.nome, data: '', horario: ''})}
                                                        className={`p-4 border rounded transition flex flex-col items-center gap-2 group
                                                            ${form.barbeiro === b.nome 
                                                                ? 'border-vic-gold bg-vic-gold/20 text-white shadow-[0_0_15px_rgba(212,175,55,0.3)]' 
                                                                : 'border-white/10 text-gray-400 hover:border-white/30 hover:bg-white/5'}
                                                        `}
                                                    >
                                                        <img 
                                                            src={b.imgPath} 
                                                            alt={b.nome}
                                                            className={`w-16 h-16 rounded-full object-cover border-2 mb-2 transition duration-300
                                                                ${form.barbeiro === b.nome ? 'border-vic-gold scale-110' : 'border-gray-600 grayscale group-hover:grayscale-0'}
                                                            `}
                                                            onError={(e) => { e.target.src = 'https://via.placeholder.com/150'; }}
                                                        />
                                                        <span className={`font-bold text-xs ${form.barbeiro === b.nome ? 'text-vic-gold' : ''}`}>{b.nome}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* 3. Seleção de Datas (Só aparece se tiver barbeiro selecionado) */}
                                        {form.barbeiro && (
                                            <div className="fade-in">
                                                <label className="text-xs text-vic-gold uppercase tracking-widest block mb-4">2. Dias Disponíveis ({form.barbeiro})</label>
                                                <div className="flex gap-3 overflow-x-auto pb-4 custom-scrollbar">
                                                    {getNextDates().filter(date => {
                                                        // Filtra os dias que o barbeiro NÃO trabalha
                                                        const diaSemana = date.getDay(); // 0 = Domingo
                                                        const diasFolga = DATA_STORE.indisponibilidade[form.barbeiro] || [];
                                                        return !diasFolga.includes(diaSemana);
                                                    }).map((date, index) => {
                                                        const dateValue = formatDateValue(date);
                                                        const { diaSemana, diaMes } = formatDateDisplay(date);
                                                        const isSelected = form.data === dateValue;

                                                        return (
                                                            <button 
                                                                key={index}
                                                                onClick={() => setForm({...form, data: dateValue, horario: ''})}
                                                                className={`min-w-[80px] p-3 rounded border text-center transition flex flex-col items-center justify-center
                                                                    ${isSelected 
                                                                        ? 'bg-vic-gold border-vic-gold text-black font-bold' 
                                                                        : 'border-white/20 text-white hover:border-vic-gold hover:text-vic-gold bg-black/50'}
                                                                `}
                                                            >
                                                                <span className="text-[10px] uppercase tracking-wider mb-1 opacity-80">{diaSemana}</span>
                                                                <span className="text-lg font-serif">{diaMes}</span>
                                                            </button>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* 4. Seleção de Horário (Só aparece se tiver data selecionada) */}
                                        {form.data && (
                                            <div className="fade-in">
                                                <label className="text-xs text-vic-gold uppercase tracking-widest block mb-4">3. Horário</label>
                                                <div className="grid grid-cols-4 gap-3">
                                                    {getAvailableSlots(form.data, form.barbeiro).map(slot => (
                                                        <button 
                                                            key={slot}
                                                            onClick={() => setForm({...form, horario: slot})}
                                                            className={`py-3 px-2 rounded text-sm font-bold border transition ${
                                                                form.horario === slot 
                                                                    ? 'bg-vic-gold text-black border-vic-gold shadow-lg transform scale-105' 
                                                                    : 'bg-transparent border-white/20 text-white hover:border-white hover:bg-white/5'
                                                            }`}
                                                        >
                                                            {slot}
                                                        </button>
                                                    ))}
                                                    {getAvailableSlots(form.data, form.barbeiro).length === 0 && (
                                                        <p className="col-span-4 text-center text-red-400 text-sm py-2 border border-red-900/50 rounded bg-red-900/10">
                                                            Agenda cheia para este dia.
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        <Button full onClick={confirmarAgendamento} disabled={!form.horario || selectedServices.length === 0}>
                                            Confirmar Agendamento
                                        </Button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 🌟 NOVA TELA: PROGRAMA DE FIDELIDADE (ITEM 12) */}
                        {activeTab === 'fidelidade' && (() => {
                            // Lógica que calcula os selos lendo o banco de dados do Admin
                            const userPhone = localStorage.getItem('victorino_user_phone');
                            const adminAppts = JSON.parse(localStorage.getItem('victorino_admin_agendamentos') || '[]');
                            // Conta apenas os serviços que o Admin marcou como "concluido"
                            const myCompletedVisits = adminAppts.filter(a => a.clientPhone === userPhone && a.status === 'concluido').length;
                            const selosAtuais = myCompletedVisits % 10; // A cada 10, zera a cartela
                            const selosTotal = 10;

                            return (
                                <div className="py-20 px-6 max-w-3xl mx-auto fade-in">
                                    <div className="text-center mb-12">
                                        <span className="text-vic-gold text-xs font-bold uppercase tracking-[0.3em] mb-2 block">Clube de Vantagens</span>
                                        <h2 className="text-4xl font-serif text-white">Cartão Fidelidade</h2>
                                    </div>

                                    {!userPhone ? (
                                        <div className="glass p-8 text-center rounded-lg border-t-2 border-vic-gold">
                                            <p className="text-gray-400 mb-6">Faça seu primeiro agendamento para ativar seu cartão fidelidade automático!</p>
                                            <button onClick={() => setActiveTab('agendar')} className="bg-vic-gold text-black px-6 py-3 font-bold uppercase text-xs rounded transition hover:bg-white">Agendar Agora</button>
                                        </div>
                                    ) : (
                                        <div className="glass p-8 rounded-lg border-t-4 border-vic-gold relative overflow-hidden">
                                            <div className="text-center mb-10">
                                                <h3 className="text-2xl font-serif text-white mb-2">Olá! Você tem <span className="text-vic-gold text-4xl">{selosAtuais}</span> selos</h3>
                                                <p className="text-gray-400 text-sm">Complete 10 selos e ganhe <span className="text-vic-green font-bold">1 Serviço Grátis</span></p>
                                            </div>

                                            {/* Gerador das 10 bolinhas do cartão */}
                                            <div className="grid grid-cols-5 gap-4 md:gap-6 mb-8 max-w-lg mx-auto">
                                                {[...Array(selosTotal)].map((_, i) => (
                                                    <div key={i} className={`aspect-square rounded-full flex items-center justify-center border-2 transition-all duration-700 ${i < selosAtuais ? 'bg-vic-gold border-vic-gold shadow-[0_0_15px_rgba(212,175,55,0.4)] transform scale-110' : 'bg-black/50 border-white/10'}`}>
                                                        <span className={`text-xl md:text-2xl ${i < selosAtuais ? 'text-black' : 'opacity-20 grayscale'}`}>✂️</span>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Mensagem de Prêmio quando bate 10 ou mais */}
                                            {selosAtuais === 0 && myCompletedVisits > 0 && (
                                                <div className="bg-vic-green/20 border border-vic-green/50 text-vic-green p-4 rounded text-center text-sm font-bold animate-pulse mt-4">
                                                    🎉 Parabéns! Sua cartela está cheia! Você ganhou um prêmio. Mostre esta tela na sua próxima visita.
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })()}

                        {/* MEUS AGENDAMENTOS */}
                        {activeTab === 'meus-agendamentos' && (
                            <div className="py-20 px-6 max-w-4xl mx-auto fade-in">
                                <SectionTitle title="Meus Horários" subtitle="Histórico" />
                                
                                {myAppointments.length === 0 ? (
                                    <div className="text-center glass p-12 rounded-lg">
                                        <p className="text-gray-400 mb-6">Você ainda não possui agendamentos.</p>
                                        <Button onClick={() => setActiveTab('agendar')}>Novo Agendamento</Button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {myAppointments.map(appt => (
                                            <div key={appt.id} className="glass p-6 rounded-lg flex flex-col md:flex-row justify-between items-center gap-4 border-l-4 border-vic-gold">
                                                <div className="text-left">
                                                    <h3 className="text-xl text-white font-serif">{appt.serviceName}</h3>
                                                    <p className="text-vic-gold text-sm uppercase tracking-widest mt-1">
                                                        {new Date(appt.date+'T12:00').toLocaleDateString('pt-BR')} às {appt.time}
                                                    </p>
                                                    <p className="text-gray-500 text-sm mt-1">Profissional: {appt.barberName}</p>
                                                </div>
                                                <button 
                                                    onClick={() => cancelarAgendamento(appt.id)}
                                                    className="text-red-500 hover:text-red-400 text-xs font-bold uppercase tracking-widest border border-red-900/50 px-4 py-2 rounded hover:bg-red-900/20 transition"
                                                >
                                                    Cancelar
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    <footer className="bg-black border-t border-white/10 py-12 px-6 mt-20">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                            <div>
                                <h2 className="text-2xl font-serif text-white mb-2">VICTORINO BARBER</h2>
                                <p className="text-gray-500 text-sm">Estilo • Atitude • Excelência</p>
                            </div>
                            <div className="text-gray-400 text-sm">
                                <p className="mb-1">📍 Centro Empresarial, Loja 01 - ES</p>
                                <p>⏰ Seg à Sex: 09h - 19h | Sáb: 09h - 18h</p>
                            </div>
                            <div className="flex gap-4">
                                <a href="#" className="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-vic-gold hover:text-black hover:border-vic-gold transition">IG</a>
                                <a href="#" className="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center text-white hover:bg-vic-gold hover:text-black hover:border-vic-gold transition">WA</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<VictorinoApp />);
    </script>
</body>
</html>
